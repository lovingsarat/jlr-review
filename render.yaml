services:
  - type: cron
    name: midlands-sentiment-scraper
    runtime: python
    schedule: "0 */6 * * *"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m backend.scraper
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: TWITTER_USERNAME
        sync: false
      - key: TWITTER_EMAIL
        sync: false
      - key: TWITTER_PASSWORD
        sync: false
